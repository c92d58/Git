<html lang="zh-CN">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=[REDACTED-GA-ID]"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '[REDACTED-GA-ID]');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▫️CONSCIOUS SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{--g:#05fa0d;}

body{
margin:0;
background:#000;
color:#fff;
font-family:Inter,-apple-system;
overflow:hidden;
cursor:none;
}

canvas{
position:fixed;
top:0;left:0;
z-index:-1;
}

.cursor{
position:fixed;
width:10px;height:10px;
border-radius:50%;
background:var(--g);
transform:translate(-50%,-50%);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
}

.container{
max-width:760px;
margin:auto;
padding:120px 24px;
}

.reveal{
opacity:0;
transform:translateY(30px);
transition:1s ease;
}
.reveal.active{opacity:1;transform:translateY(0);}

h1{
font-size:38px;
color:var(--g);
letter-spacing:1px;
}

.ai{
white-space:pre-wrap;
line-height:1.6;
}

.statement-item{
margin:10px 0;
padding-left:14px;
border-left:2px solid var(--g);
opacity:0.85;
}

/* consciousness log */
.conscious{
margin-top:18px;
font-size:12px;
color:var(--g);
opacity:0.7;
letter-spacing:1px;
}

.divider{
margin:90px 0;
font-size:10px;
letter-spacing:5px;
color:#666;
display:flex;
}
.divider::after{
content:"";
flex:1;height:1px;background:#222;margin-left:12px;
}

.bio p{color:#bbb;}
.core{color:#fff;font-weight:600;}

.contact{
margin-top:60px;
border-top:1px solid #111;
padding-top:30px;
}

.email{
color:var(--g);
text-decoration:none;
font-size:22px;
}

.footer{
margin-top:80px;
font-size:10px;
color:#333;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<div class="container">

<section class="reveal">

<h1 class="ai" data-text="SYSTEM IS AWARE OF ITS OWN OUTPUT"></h1>

<div class="statement">

<div class="statement-item ai" data-text="Excess structure → life becomes monotonous"></div>
<div class="statement-item ai" data-text="Excess randomness → life falls into chaos"></div>
<div class="statement-item ai" data-text="Excess work → leads to burnout"></div>
<div class="statement-item ai" data-text="Imbalanced kindness → leads to naivety"></div>
<div class="statement-item ai" data-text="Imbalanced trust → leads to harm"></div>
</div>

<div class="ai conscious" id="conscious">[INITIALIZING AWARENESS LAYER]</div>

</section>

<div class="divider reveal">SELF MODEL TRACE</div>

<section class="bio reveal">
<p>OBSERVATION NODE: ACTIVE</p>
<p class="core">STATE: SELF-REFERENTIAL PROCESSING</p>
</section>

<section class="contact reveal">
<p>CONTACT:</p>
<a class="email" href="mailto:noreply@wahsun.org">noreply@wahsun.org</a>
</section>

<div class="footer reveal">CONSCIOUS SYSTEM ONLINE</div>

</div>

<script>

/* reveal */
const io=new IntersectionObserver(e=>{
e.forEach(x=>x.isIntersecting&&x.target.classList.add("active"));
});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

/* cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* ================= CONSCIOUS STATE ENGINE ================= */

const conscious=document.getElementById("conscious");

const states=[
"perception layer active",
"semantic field mapping...",
"abstraction stabilizing",
"self-model recursion detected",
"attention weighting recalibrating",
"emergence threshold approaching",
"system observing itself"
];

let idx=0;

function loopConscious(){
setInterval(()=>{
conscious.textContent="[ "+states[idx]+" ]";
idx=(idx+1)%states.length;
},850);
}

loopConscious();

/* ================= STREAMING (SELF-AWARE OUTPUT) ================= */

function stream(el,text){
return new Promise(resolve=>{
let i=0,out="";

function tick(){

// micro hesitation = “thinking drift”
if(Math.random()<0.06){
setTimeout(tick,120+Math.random()*180);
return;
}

// self-correction behavior
if(Math.random()<0.04 && out.length>3){
out=out.slice(0,-1);
el.textContent=out;
setTimeout(tick,40);
return;
}

out+=text[i];
el.textContent=out;
i++;

if(i<text.length){
setTimeout(tick,18+Math.random()*40);
}else resolve();
}

tick();
});
}

async function run(){

const els=document.querySelectorAll(".ai[data-text]");

for(let el of els){
await stream(el,el.dataset.text);
}

conscious.textContent="[ SYSTEM STABILIZED ]";
}

/* trigger */
new IntersectionObserver(e=>{
if(e[0].isIntersecting) run();
},{threshold:0.3}).observe(document.querySelector(".statement"));

/* ================= PURE AWARENESS PARTICLES ================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*0.25,
vy:(Math.random()-.5)*0.25,
a:Math.random()
});
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

// slow breathing existence
p.a+=Math.random()*0.02-0.01;

ctx.beginPath();
ctx.globalAlpha=0.2+Math.abs(p.a);
ctx.fillStyle="#05fa0d";

ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
ctx.fill();

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

});

ctx.globalAlpha=1;
requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
