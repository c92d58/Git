          "THE EXPERIENCE OF THE 80S PROVIDED MY SOLID FOUNDATION, WHILE MY CONTEMPORARY LIFE IS NURTURED BY THE FLOOD OF CUTTING-EDGE IT AND AI TECHNOLOGY.",

          if (j < item.length) {
            setTimeout(doChar,30);
          }
          else {
            e.innerHTML += "<br/>";
            doItem();
          }
        },
        doItem = function() {
          if (i < menu.length) {
            item = menu[i++];
            j = 0;
            doChar();
          }
        };
      doItem();
