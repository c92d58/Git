<!DOCTYPE html>
<html lang="English">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▫️CONSCIOUS SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{--g:#05fa0d;}

body{
margin:0;
background:#000000;
color:#fff;
font-family:Inter,-apple-system;
overflow:hidden;
cursor:none;
}

canvas{
position:fixed;
top:0;left:0;
z-index:-1;
}

.cursor{
position:fixed;
width:8px;height:8px;
border-radius:50%;
background:var(--g);
transform:translate(-50%,-50%);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
}

.container{
max-width:1000px;
margin:auto;
padding:120px 24px;
}

.reveal{
opacity:0;
transform:translateY(30px);
transition:1s ease;
}
.reveal.active{opacity:1;transform:translateY(0);}

h1{
font-size:30px;
color:var(--g);
letter-spacing:1px;
}

.ai{
white-space:pre-wrap;
line-height:1.6;
}

.statement-item{
margin:10px 0;
padding-left:12px;
border-left:2px solid var(--g);
opacity:0.85;
}

.conscious{
margin-top:18px;
font-size:12px;
color:var(--g);
opacity:0.7;
letter-spacing:1px;
}

.divider{
margin:90px 0;
font-size:10px;
letter-spacing:5px;
color:#666;
display:flex;
}
.divider::after{
content:"";
flex:1;height:1px;background:#222;margin-left:12px;
}

.bio p{color:#bbb;}
.core{color:#fff;font-weight:600;}

.contact{
margin-top:60px;
border-top:1px solid #111;
padding-top:30px;
}

.email{
color:var(--g);
text-decoration:none;
font-size:22px;
}

.footer{
margin-top:80px;
font-size:10px;
color:#333;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<div class="container">

<section class="reveal">

<h1 class="ai" data-text="SYSTEM IS AWARE OUTPUT"></h1>
<div class="ai conscious" id="conscious">[INITIALIZING AWARENESS LAYER]</div>
<div class="statement"></div>

</section>

<div class="divider reveal">SELF MODEL TRACE</div>

<section class="bio reveal">
<p>OBSERVATION NODE: ACTIVE</p>
<p class="core">STATE: SELF-REFERENTIAL PROCESSING</p>
</section>

<section class="contact reveal">
<p>CONNECT:</p> 
<a class="email" href="mailto:X@WAHSUN.ORG">X@WAHSUN.ORG</a>
</section>

<div class="footer reveal">PS: THIS PAGE IS DEPLOYED TO SHIELD VISITORS FROM SERVER ERROR MESSAGES.</div>

</div>

<script>

/* reveal */
const io=new IntersectionObserver(e=>{
e.forEach(x=>x.isIntersecting&&x.target.classList.add("active"));
});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

/* cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* ================= CONSCIOUS STATE ENGINE ================= */

const conscious=document.getElementById("conscious");

const states=[
"PERCEPTION LAYER ACTIVE",
"SEMANTIC FIELD MAPPING...",
"ABSTRACTION STABILIZING",
"SELF-MODEL RECURSION DETECTED",
"ATTENTION WEIGHTING RECALIBRATING",
"EMERGENCE THRESHOLD APPROACHING",
"SYSTEM OBSERVING ITSELF"
];

let idx=0;

setInterval(()=>{
conscious.textContent="[ "+states[idx]+" ]";
idx=(idx+1)%states.length;
},850);

/* ================= STREAMING ================= */

function stream(el,text){
return new Promise(resolve=>{
let i=0,out="";

function tick(){

if(Math.random()<0.06){
setTimeout(tick,120+Math.random()*180);
return;
}

if(Math.random()<0.04 && out.length>3){
out=out.slice(0,-1);
el.textContent=out;
setTimeout(tick,40);
return;
}

out+=text[i];
el.textContent=out;
i++;

if(i<text.length){
setTimeout(tick,18+Math.random()*40);
}else resolve();
}

tick();
});
}

async function run(){
const els=document.querySelectorAll(".ai[data-text]");
for(let el of els){
await stream(el,el.dataset.text);
}
conscious.textContent="[ SYSTEM STABILIZED ]";
}

new IntersectionObserver(e=>{
if(e[0].isIntersecting) run();
},{threshold:0.3}).observe(document.querySelector(".statement"));

/* ================= NEURAL PARTICLES + CONNECTING WIRE ================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*0.25,
vy:(Math.random()-.5)*0.25,
a:Math.random()
});
}

/* TIE */
function drawConnections(){
for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){

let dx=particles[i].x-particles[j].x;
let dy=particles[i].y-particles[j].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<110){
let alpha=1-dist/110;

ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);

ctx.strokeStyle=`rgba(5,250,13,${alpha*0.25})`;
ctx.lineWidth=0.6;
ctx.stroke();
}
}
}
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.1)";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* TIE */
drawConnections();

particles.forEach(p=>{

p.a+=Math.random()*0.02-0.01;

ctx.beginPath();
ctx.globalAlpha=0.2+Math.abs(p.a);
ctx.fillStyle="#05fa0d";

ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
ctx.fill();

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

});

ctx.globalAlpha=1;
requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
