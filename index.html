<style>
:root{--g:#05fa0d;}

body{
margin:0;
background:#000000;
color:#fff;
font-family:Inter,-apple-system;
overflow:hidden;
cursor:none;
}

canvas{
position:fixed;
top:0;left:0;
z-index:-1;
}

.cursor{
position:fixed;
width:8px;height:8px;
border-radius:50%;
background:var(--g);
transform:translate(-50%,-50%);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
}

.container{
max-width:1000px;
margin:auto;
padding:clamp(60px,10vw,120px) clamp(16px,4vw,48px);
}

.reveal{
opacity:0;
transform:translateY(30px);
transition:1s ease;
}
.reveal.active{opacity:1;transform:translateY(0);}

h1{
font-size:clamp(20px,4vw,30px);
color:var(--g);
letter-spacing:1px;
}

.ai{
white-space:pre-wrap;
line-height:1.6;
}

.statement-item{
margin:10px 0;
padding-left:12px;
border-left:2px solid var(--g);
opacity:0.85;
}

.conscious{
margin-top:18px;
font-size:12px;
color:var(--g);
opacity:0.7;
letter-spacing:1px;
}

.divider{
margin:clamp(40px,8vw,90px) 0;
font-size:clamp(8px,1.4vw,10px);
letter-spacing:5px;
color:#666;
display:flex;
}
.divider::after{
content:"";
flex:1;height:1px;background:#222;margin-left:12px;
}

.bio p{color:#bbb;}
.node{color:var(--g);font-weight:600;}
.core{color:#fff;font-weight:600;}

.contact{
margin-top:clamp(30px,6vw,60px);
border-top:1px solid #111;
padding-top:clamp(16px,3vw,30px);
}

.email{
color:var(--g);
text-decoration:none;
font-size:clamp(16px,3vw,22px);
}

@keyframes blink{
0%,49%{opacity:1;}
50%,100%{opacity:0;}
}

.cursor-blink{
font-size:clamp(12px,2vw,16px);
color:#999;
display:inline;
margin-left:2px;
animation:blink 0.7s infinite;
}

.footer{
margin-top:clamp(40px,8vw,80px);
font-size:clamp(8px,1.4vw,10px);

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<div class="container">

<section class="reveal">

<h1 class="ai" data-text="KERNELDIAGNOSTIC"></h1>
<div style="display:flex;margin-top:12px;margin-bottom:20px;">
<div class="ai" style="font-size:clamp(12px,2vw,16px);color:#999;" id="subtitle" data-text="> CAT /PROC/PERSONALITY // PERSONALITY DIAGNOSIS LOADING..."></div>
<div id="cursor" class="cursor-blink" style="display:none;">|</div>
</div>

</section>

<div class="divider reveal">SELF MODEL TRACE</div>

<section class="bio reveal">
<p class="node">OBSERVATION NODE: ACTIVE</p>
<p class="core">STATE: SELF-REFERENTIAL PROCESSING</p>
</section>

<section class="contact reveal">
<p>CONNECT:</p> 
<a class="email" href="mailto:X@WAHSUN.ORG">X@WAHSUN.ORG</a>
</section>

<div class="footer reveal">PS: THIS PAGE IS DEPLOYED TO SHIELD VISITORS FROM SERVER ERROR MESSAGES.</div>

</div>

<script>

/* reveal */
const io=new IntersectionObserver(e=>{
e.forEach(x=>x.isIntersecting&&x.target.classList.add("active"));
});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

/* cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* ================= STREAMING ================= */

function stream(el,text){
return new Promise(resolve=>{
let i=0,out="";

function tick(){

if(Math.random()<0.06){
setTimeout(tick,120+Math.random()*180);
return;
}

if(Math.random()<0.04 && out.length>3){
out=out.slice(0,-1);
el.textContent=out;
setTimeout(tick,40);
return;
}

out+=text[i];
el.textContent=out;
i++;

if(i<text.length){
setTimeout(tick,18+Math.random()*40);
}else resolve();
}

tick();
});
}

async function run(){
const els=document.querySelectorAll(".ai[data-text]");
for(let el of els){
if(el.tagName==="DIV"&&el.hasAttribute("data-text")&&el.getAttribute("data-text").startsWith(">")){
await stream(el,el.dataset.text);
document.getElementById("cursor").style.display="inline";
}else{
el.textContent=el.dataset.text;
}
}
}

run();

/* ================= NEURAL PARTICLES + CONNECTING WIRE ================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let W,H,particles=[];

function createParticles(){
const count=Math.max(60,Math.min(200,Math.floor(W*H/15000)));
particles=Array.from({length:count},()=>({
x:Math.random()*W,
y:Math.random()*H,
vx:(Math.random()-.5)*0.3,
vy:(Math.random()-.5)*0.3,
a:Math.random(),
}));
}

function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
createParticles();
}
resize();
addEventListener("resize",resize);

/* TIE */
function drawConnections(){
const maxDist=Math.min(W,H)*0.12;
const maxDistSq=maxDist*maxDist;
const n=particles.length;
for(let i=0;i<n;i++){
const pi=particles[i];
for(let j=i+1;j<n;j++){
const pj=particles[j];
const dx=pi.x-pj.x,dy=pi.y-pj.y;
const distSq=dx*dx+dy*dy;
if(distSq<maxDistSq){
const alpha=1-Math.sqrt(distSq)/maxDist;
ctx.beginPath();
ctx.moveTo(pi.x,pi.y);
ctx.lineTo(pj.x,pj.y);
ctx.strokeStyle=`rgba(5,250,13,${alpha*0.3})`;
ctx.lineWidth=0.5;
ctx.stroke();
}
}
}
}

function draw(){
ctx.clearRect(0,0,W,H);
drawConnections();
for(const p of particles){
p.a+=Math.random()*0.02-0.01;
ctx.globalAlpha=Math.abs(p.a);
ctx.fillStyle="#05fa0d";
ctx.beginPath();
ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
ctx.fill();
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>W)p.vx*=-1;
if(p.y<0||p.y>H)p.vy*=-1;
}
ctx.globalAlpha=1;
requestAnimationFrame(draw);
}
draw();

</script>
