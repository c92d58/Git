<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=[REDACTED-GA-ID]"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', '[REDACTED-GA-ID]');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>▫️CONSCIOUS SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{--g:#05fa0d;}

body{
margin:0;
background:#000000;
color:#fff;
font-family:Inter,-apple-system;
overflow:hidden;
cursor:none;
}

canvas{
position:fixed;
top:0;left:0;
z-index:-1;
}

.cursor{
position:fixed;
width:8px;height:8px;
border-radius:50%;
background:var(--g);
transform:translate(-50%,-50%);
pointer-events:none;
mix-blend-mode:screen;
z-index:9999;
}

.container{
max-width:1000px;
margin:auto;
padding:clamp(60px,10vw,120px) clamp(16px,4vw,48px);
}

.reveal{
opacity:0;
transform:translateY(30px);
transition:1s ease;
}
.reveal.active{opacity:1;transform:translateY(0);}

h1{
font-size:clamp(28px,5vw,52px);
color:#fff;
font-weight:800;
line-height:1.1;
margin-bottom:8px;
}
h1 .highlight{color:var(--g);}

.ai{
white-space:pre-wrap;
line-height:1.6;
}

.statement-item{
margin:10px 0;
padding-left:12px;
border-left:2px solid var(--g);
opacity:0.85;
}

.badge{display:inline-block;border:1px solid var(--g);color:var(--g);font-size:11px;padding:4px 12px;letter-spacing:3px;margin-bottom:24px;opacity:0.6;}
.sub{
font-size:clamp(14px,2vw,18px);
color:#666;
margin-bottom:40px;
border-left:2px solid var(--g);
padding-left:16px;
}
.cursor-blink{animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}

.divider{
margin:clamp(40px,8vw,90px) 0;
font-size:clamp(8px,1.4vw,10px);
letter-spacing:5px;
color:#666;
display:flex;
}
.divider::after{
content:"";
flex:1;height:1px;background:#222;margin-left:12px;
}

.bio p{color:#bbb;}
.core{color:#fff;font-weight:600;}

.contact{
margin-top:clamp(30px,6vw,60px);
border-top:1px solid #111;
padding-top:clamp(16px,3vw,30px);
}

.email{
color:var(--g);
text-decoration:none;
font-size:clamp(16px,3vw,22px);
}

.footer{
margin-top:clamp(40px,8vw,80px);
font-size:clamp(8px,1.4vw,10px);
color:#333;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="cursor"></div>

<div class="container">

<section class="reveal">

<h1>HELLO, <span class="highlight">WORLD</span>.</h1>
<p class="sub"><span id="typewriter"></span><span class="cursor-blink">|</span></p>

</section>

<div class="divider reveal">SELF MODEL TRACE</div>

<section class="bio reveal">
<p>OBSERVATION NODE: ACTIVE</p>
<p class="core">STATE: SELF-REFERENTIAL PROCESSING</p>
</section>

<section class="contact reveal">
<p>CONNECT:</p>
<a class="email" href="mailto:noreply@wahsun.org">noreply@wahsun.org</a>
</section>

<div class="footer reveal">PS: THIS PAGE IS DEPLOYED TO SHIELD VISITORS FROM SERVER ERROR MESSAGES.</div>

</div>

<script>

/* reveal */
const io=new IntersectionObserver(e=>{
e.forEach(x=>x.isIntersecting&&x.target.classList.add("active"));
});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

/* cursor */
const cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* typewriter */
const twEl=document.getElementById("typewriter");
const twText='> SYSTEM.ONLINE // :: READY FOR INCOMING SIGNALS';
let twIdx=0,twOut='';
function tick(){if(twIdx<twText.length){twOut+=twText[twIdx];twEl.textContent=twOut;twIdx++;setTimeout(tick,18+Math.random()*40);}}
tick();

/* ================= NEURAL PARTICLES + CONNECTING WIRE ================= */

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

let W,H,particles=[];

function createParticles(){
const count=Math.max(60,Math.min(200,Math.floor(W*H/15000)));
particles=Array.from({length:count},()=>({
x:Math.random()*W,
y:Math.random()*H,
vx:(Math.random()-.5)*0.3,
vy:(Math.random()-.5)*0.3,
a:Math.random(),
}));
}

function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;
createParticles();
}
resize();
addEventListener("resize",resize);

/* TIE */
function drawConnections(){
const maxDist=Math.min(W,H)*0.12;
const maxDistSq=maxDist*maxDist;
const n=particles.length;
for(let i=0;i<n;i++){
const pi=particles[i];
for(let j=i+1;j<n;j++){
const pj=particles[j];
const dx=pi.x-pj.x,dy=pi.y-pj.y;
const distSq=dx*dx+dy*dy;
if(distSq<maxDistSq){
const alpha=1-Math.sqrt(distSq)/maxDist;
ctx.beginPath();
ctx.moveTo(pi.x,pi.y);
ctx.lineTo(pj.x,pj.y);
ctx.strokeStyle=`rgba(5,250,13,${alpha*0.3})`;
ctx.lineWidth=0.5;
ctx.stroke();
}
}
}
}

function draw(){
ctx.clearRect(0,0,W,H);
drawConnections();
for(const p of particles){
p.a+=Math.random()*0.02-0.01;
ctx.globalAlpha=Math.abs(p.a);
ctx.fillStyle="#05fa0d";
ctx.beginPath();
ctx.arc(p.x,p.y,1.2,0,Math.PI*2);
ctx.fill();
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>W)p.vx*=-1;
if(p.y<0||p.y>H)p.vy*=-1;
}
ctx.globalAlpha=1;
requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
