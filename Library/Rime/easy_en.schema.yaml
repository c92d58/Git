# Rime schema: easy_en
# encoding: utf-8
---
schema:
  schema_id: easy_en
  name: 英文混输
  version: "1.0"
  author:
    - Rime community
  description: |
    English input for mixed Chinese-English typing.
  dependencies: []

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

translator:
  dictionary: easy_en
  enable_completion: true
  enable_sentence: false
  initial_quality: 1
  enable_user_dict: false

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcba-'."
  delimiter: ""

menu:
  page_size: 9

switches:
  - name: ascii_punct
    states: ["。，", "．，"]
