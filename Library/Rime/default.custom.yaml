patch:
  # 输入方案（繁體為主）
  schema_list:
    - schema: luna_pinyin
    - schema: luna_pinyin_simp

  # 中英切换 — 仅 F4
  switcher:
    caption: "〔方案〕"
    hotkeys:
      - F4
    save_options:
      - full_shape
      - ascii_punct
      - traditional

  # 中文标点全角
  punctuator:
    import_preset: default
    full_shape:
      " " : { commit: "　" }
    half_shape:
      " " : { commit: " " }

  # 候选词
  menu:
    page_size: 6

  # Shift — 左Shift切中英，右Shift无操作
  ascii_composer:
    good_old_caps_lock: true
    switch_key:
      Shift_L: inline_ascii
      Shift_R: noop

  # 按键绑定
  key_binder:
    select_first_character: bracketleft
    select_last_character: bracketright
    bindings:
      - { when: composing, accept: Shift+Return, send: Return }
      - { when: composing, accept: bracketleft, send: Page_Up }
      - { when: has_menu, accept: bracketright, send: Page_Down }
      - { when: paging, accept: minus, send: Page_Up }
      - { when: has_menu, accept: equal, send: Page_Down }
