patch:
  # 外观设置 — Matrix dark
  style:
    color_scheme: matrix
    candidate_list_layout: linear
    text_orientation: horizontal
    inline_preedit: true
    corner_radius: 6
    border_height: 4
    border_width: 6
    line_spacing: 1
    font_point: 14
    label_font_point: 11

  # Matrix 配色方案 — 暗底绿字
  preset_color_schemes:
    matrix:
      name: "Matrix"
      author: "WAHSUN"
      # 背景
      back_color: 0x0a0f0a
      border_color: 0x1a2a1a
      # 普通候选
      text_color: 0x00ff41
      candidate_text_color: 0x00cc33
      label_color: 0x006620
      comment_text_color: 0x004d18
      # 首选高亮
      hilited_text_color: 0x00ff41
      hilited_back_color: 0x1a2a1a
      hilited_candidate_text_color: 0x00ff41
      hilited_candidate_back_color: 0x003300
      hilited_label_color: 0x00ff41
      hilited_comment_text_color: 0x009933

  # 每页候选数
  app_options:
    com.microsoft.VSCode:
      ascii_mode: true
    com.jetbrains.intellij:
      ascii_mode: true
    com.jetbrains.pycharm:
      ascii_mode: true
    com.googlecode.iterm2:
      ascii_mode: true
    com.apple.Terminal:
      ascii_mode: true
    md.obsidian:
      ascii_mode: true
