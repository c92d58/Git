patch:
  engine/translators:
    - punct_translator
    - "table_translator@custom_phrase"
    - "table_translator@easy_en"
    - reverse_lookup_translator
    - script_translator
  custom_phrase:
    dictionary: ""
    user_dict: custom_phrase
    db_class: stabledb
    enable_completion: false
    enable_sentence: false
    initial_quality: 1
  easy_en:
    dictionary: easy_en
    enable_completion: true
    enable_sentence: false
    initial_quality: -1
  switches/@0/states:
    - 中
    - 英
